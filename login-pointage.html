<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CHL — Pointage</title>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Exo+2:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    :root{--bg:#040e1c;--blue:#0ea5e9;--blue-dim:rgba(14,165,233,0.15);--blue-border:rgba(14,165,233,0.2);--text:#cce8f8;--muted:#4a8fa8;--green:#22c55e;}
    body{font-family:'Exo 2',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden;}
    body::before{content:'';position:fixed;inset:0;
      background-image:linear-gradient(rgba(14,165,233,0.04) 1px,transparent 1px),linear-gradient(90deg,rgba(14,165,233,0.04) 1px,transparent 1px);
      background-size:32px 32px;animation:gridScroll 20s linear infinite;}
    @keyframes gridScroll{0%{background-position:0 0}100%{background-position:32px 32px}}
    body::after{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 50% 50%,rgba(34,197,94,0.06) 0%,transparent 65%);pointer-events:none;}

    .card{position:relative;width:400px;padding:44px 38px;background:rgba(6,18,38,0.95);border:1px solid var(--blue-border);
      border-radius:4px;box-shadow:0 0 50px rgba(34,197,94,0.08),inset 0 1px 0 rgba(255,255,255,0.04);backdrop-filter:blur(20px);z-index:1;}
    .card::before,.card::after{content:'';position:absolute;width:18px;height:18px;border-color:var(--green);border-style:solid;}
    .card::before{top:-1px;left:-1px;border-width:2px 0 0 2px;}
    .card::after{bottom:-1px;right:-1px;border-width:0 2px 2px 0;}

    .logo-area{text-align:center;margin-bottom:36px;}
    .logo-cross{width:60px;height:60px;margin:0 auto 14px;filter:drop-shadow(0 0 14px rgba(34,197,94,0.5));}
    .logo-cross svg{width:100%;height:100%;}
    .logo-title{font-family:'Rajdhani',sans-serif;font-size:30px;font-weight:700;letter-spacing:6px;color:#fff;}
    .logo-sub{font-size:10px;letter-spacing:3px;color:var(--green);text-transform:uppercase;margin-top:3px;}
    .logo-sub2{font-size:10px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;margin-top:2px;}

    .scan-line{width:100%;height:1px;background:linear-gradient(90deg,transparent,var(--green),transparent);margin:22px 0 28px;animation:scanPulse 3s ease-in-out infinite;}
    @keyframes scanPulse{0%,100%{opacity:0.4}50%{opacity:1;box-shadow:0 0 8px var(--green);}}

    label{display:block;font-size:10px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;margin-bottom:7px;}
    input{width:100%;padding:11px 14px;background:rgba(34,197,94,0.05);border:1px solid rgba(34,197,94,0.2);border-radius:2px;
      color:var(--text);font-family:'Exo 2',sans-serif;font-size:14px;outline:none;transition:all 0.2s;margin-bottom:18px;}
    input:focus{border-color:var(--green);background:rgba(34,197,94,0.09);box-shadow:0 0 18px rgba(34,197,94,0.1);}
    input::placeholder{color:rgba(74,143,168,0.4);}

    .btn-login{width:100%;padding:13px;background:linear-gradient(135deg,#15803d,var(--green));border:none;border-radius:2px;
      color:white;font-family:'Rajdhani',sans-serif;font-size:15px;font-weight:700;letter-spacing:3px;text-transform:uppercase;
      cursor:pointer;transition:all 0.2s;position:relative;overflow:hidden;margin-top:2px;}
    .btn-login::after{content:'';position:absolute;top:50%;left:-100%;width:100%;height:100%;
      background:linear-gradient(90deg,transparent,rgba(255,255,255,0.15),transparent);transform:translateY(-50%) skewX(-20deg);transition:left 0.4s;}
    .btn-login:hover{transform:translateY(-1px);box-shadow:0 8px 25px rgba(34,197,94,0.35);}
    .btn-login:hover::after{left:100%;}

    .error-msg{display:none;background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);color:#fca5a5;
      padding:9px 13px;border-radius:2px;font-size:12px;text-align:center;margin-top:14px;}

    .link-dispatch{display:block;text-align:center;margin-top:20px;font-size:11px;color:var(--muted);letter-spacing:1px;}
    .link-dispatch a{color:var(--blue);text-decoration:none;}
    .link-dispatch a:hover{color:var(--text);}

    .status-bar{display:flex;align-items:center;gap:6px;margin-top:26px;justify-content:center;font-size:10px;color:var(--muted);letter-spacing:1px;}
    .status-dot{width:6px;height:6px;background:var(--green);border-radius:50%;box-shadow:0 0 6px var(--green);animation:blink 2s ease infinite;}
    @keyframes blink{0%,100%{opacity:1}50%{opacity:0.3}}
  </style>
</head>
<body>
  <div class="card">
    <div class="logo-area">
      <div class="logo-cross">
        <svg viewBox="0 0 60 60" fill="none"><rect x="20" y="4" width="20" height="52" rx="3" fill="#22c55e" opacity="0.9"/>
        <rect x="4" y="20" width="52" height="20" rx="3" fill="#22c55e" opacity="0.9"/>
        <rect x="24" y="8" width="12" height="44" rx="1" fill="white" opacity="0.15"/>
        <rect x="8" y="24" width="44" height="12" rx="1" fill="white" opacity="0.15"/></svg>
      </div>
      <div class="logo-title">CHL</div>
      <div class="logo-sub">Système de Pointage</div>
      <div class="logo-sub2">Centre Hospitalier Légrand</div>
    </div>
    <div class="scan-line"></div>
    <label>Identifiant</label>
    <input type="text" id="username" placeholder="Votre nom d'utilisateur" autocomplete="off">
    <label>Mot de passe</label>
    <input type="password" id="password" placeholder="••••••••">
    <button class="btn-login" onclick="handleLogin()">Accéder au pointage</button>
    <div class="error-msg" id="error-msg">Identifiants invalides.</div>
    <div class="link-dispatch">Responsable ? <a href="login.html">→ Accès Dispatch</a></div>
    <div class="status-bar"><div class="status-dot"></div>SYSTÈME OPÉRATIONNEL</div>
  </div>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';
    const supabase = createClient(
      'https://gktawbaposndfxijkxdk.supabase.co',
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdrdGF3YmFwb3NuZGZ4aWpreGRrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjQwNzUyNDUsImV4cCI6MjA3OTY1MTI0NX0.tY-CHuyb2zr9s6hlGkwmrdTvg920VVNghI9S45CjwKk'
    );
    window.handleLogin = async function() {
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value.trim();
      if (!username || !password) return;
      const { data } = await supabase.from('chl_users').select('*').eq('username',username).eq('password',password).single();
      if (data) {
        localStorage.setItem('chl_point_user', JSON.stringify(data));
        window.location.href = 'pointage.html';
      } else {
        document.getElementById('error-msg').style.display = 'block';
      }
    };
    document.addEventListener('keydown', e => { if (e.key==='Enter') window.handleLogin(); });
  </script>
</body>
</html>

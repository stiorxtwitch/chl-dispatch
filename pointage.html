<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CHL — Mon Pointage</title>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Exo+2:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    :root{
      --bg:#040e1c;--panel:rgba(6,18,38,0.96);--blue:#0ea5e9;--blue-dim:rgba(14,165,233,0.15);--blue-border:rgba(14,165,233,0.2);
      --text:#cce8f8;--muted:#4a8fa8;--green:#22c55e;--red:#ef4444;--yellow:#f59e0b;
    }
    html,body{height:100%;overflow:hidden;}
    body{font-family:'Exo 2',sans-serif;background:var(--bg);color:var(--text);display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;}
    body::before{content:'';position:fixed;inset:0;z-index:0;
      background-image:linear-gradient(rgba(14,165,233,0.04) 1px,transparent 1px),linear-gradient(90deg,rgba(14,165,233,0.04) 1px,transparent 1px);
      background-size:32px 32px;animation:gridDrift 30s linear infinite;}
    @keyframes gridDrift{0%{background-position:0 0}100%{background-position:32px 32px}}

    .page-wrap{position:relative;z-index:1;width:100%;max-width:500px;padding:20px;}

    /* TOP HEADER */
    .top-header{text-align:center;margin-bottom:28px;}
    .top-logo{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:6px;}
    .top-logo svg{width:26px;height:26px;filter:drop-shadow(0 0 8px var(--blue));}
    .top-title{font-family:'Rajdhani',sans-serif;font-size:22px;font-weight:700;letter-spacing:4px;color:#fff;text-shadow:0 0 15px rgba(14,165,233,0.5);}
    .top-sub{font-size:10px;letter-spacing:3px;color:var(--blue);text-transform:uppercase;}

    /* USER CARD */
    .user-card{background:var(--panel);border:1px solid var(--blue-border);border-radius:6px;padding:24px 28px;margin-bottom:18px;position:relative;}
    .user-card::before,.user-card::after{content:'';position:absolute;width:14px;height:14px;border-color:var(--blue);border-style:solid;}
    .user-card::before{top:-1px;left:-1px;border-width:2px 0 0 2px;}
    .user-card::after{bottom:-1px;right:-1px;border-width:0 2px 2px 0;}
    .user-greeting{font-size:11px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;margin-bottom:6px;}
    .user-name{font-family:'Rajdhani',sans-serif;font-size:28px;font-weight:700;color:#fff;letter-spacing:2px;}
    .user-role{font-size:12px;color:var(--blue);letter-spacing:1px;margin-top:3px;}
    .user-meta{display:flex;gap:12px;margin-top:14px;flex-wrap:wrap;}
    .meta-chip{font-size:10px;letter-spacing:1px;color:var(--muted);background:var(--blue-dim);border:1px solid var(--blue-border);padding:3px 10px;border-radius:2px;}

    /* STATUS CARD */
    .status-card{background:var(--panel);border:1px solid var(--blue-border);border-radius:6px;padding:20px 24px;margin-bottom:18px;text-align:center;}
    .status-label{font-size:10px;letter-spacing:3px;color:var(--muted);text-transform:uppercase;margin-bottom:12px;}

    /* BIG STATUS INDICATOR */
    .status-indicator{display:flex;flex-direction:column;align-items:center;gap:12px;margin-bottom:18px;}
    .status-ring{width:100px;height:100px;border-radius:50%;border:3px solid;display:flex;align-items:center;justify-content:center;position:relative;transition:all 0.3s;}
    .status-ring.offline{border-color:var(--muted);box-shadow:none;}
    .status-ring.online{border-color:var(--green);box-shadow:0 0 25px rgba(34,197,94,0.4);animation:ringPulse 2.5s ease-in-out infinite;}
    @keyframes ringPulse{0%,100%{box-shadow:0 0 15px rgba(34,197,94,0.3)}50%{box-shadow:0 0 35px rgba(34,197,94,0.6)}}
    .status-ring-inner{width:70px;height:70px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:28px;transition:all 0.3s;}
    .status-ring.offline .status-ring-inner{background:rgba(107,114,128,0.15);}
    .status-ring.online .status-ring-inner{background:rgba(34,197,94,0.15);}
    .status-text{font-family:'Rajdhani',sans-serif;font-size:20px;font-weight:700;letter-spacing:3px;text-transform:uppercase;}
    .status-text.offline{color:var(--muted);}
    .status-text.online{color:var(--green);text-shadow:0 0 12px rgba(34,197,94,0.5);}
    .status-since{font-size:11px;color:var(--muted);letter-spacing:1px;min-height:16px;}
    .status-since span{color:var(--text);font-weight:600;}

    /* TIMER */
    .timer-display{font-family:'Rajdhani',sans-serif;font-size:38px;font-weight:700;letter-spacing:4px;color:#fff;text-shadow:0 0 20px rgba(34,197,94,0.3);margin:4px 0;}
    .timer-display.offline{color:var(--muted);text-shadow:none;}

    /* ACTION BUTTON */
    .btn-action{width:100%;padding:16px;border:none;border-radius:4px;font-family:'Rajdhani',sans-serif;font-size:17px;font-weight:700;
      letter-spacing:3px;text-transform:uppercase;cursor:pointer;transition:all 0.25s;position:relative;overflow:hidden;margin-bottom:10px;}
    .btn-action.btn-start{background:linear-gradient(135deg,#15803d,var(--green));color:white;box-shadow:0 4px 20px rgba(34,197,94,0.2);}
    .btn-action.btn-start:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(34,197,94,0.4);}
    .btn-action.btn-stop{background:linear-gradient(135deg,#991b1b,var(--red));color:white;box-shadow:0 4px 20px rgba(239,68,68,0.2);}
    .btn-action.btn-stop:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(239,68,68,0.35);}
    .btn-action::after{content:'';position:absolute;top:50%;left:-100%;width:100%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.12),transparent);transform:translateY(-50%) skewX(-20deg);transition:left 0.4s;}
    .btn-action:hover::after{left:100%;}

    /* HISTORY */
    .history-card{background:var(--panel);border:1px solid var(--blue-border);border-radius:6px;padding:16px 20px;}
    .history-title{font-family:'Rajdhani',sans-serif;font-size:13px;font-weight:700;letter-spacing:2px;color:var(--blue);text-transform:uppercase;margin-bottom:12px;}
    .history-empty{font-size:11px;color:rgba(74,143,168,0.4);text-align:center;padding:12px;letter-spacing:1px;}
    .history-list{max-height:180px;overflow-y:auto;}
    .history-list::-webkit-scrollbar{width:3px;}
    .history-list::-webkit-scrollbar-thumb{background:var(--blue-border);border-radius:2px;}
    .history-item{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid rgba(14,165,233,0.08);}
    .history-item:last-child{border-bottom:none;}
    .history-date{font-size:11px;color:var(--muted);letter-spacing:1px;}
    .history-times{font-family:'Rajdhani',sans-serif;font-size:13px;color:var(--text);letter-spacing:1px;}
    .history-dur{font-size:11px;color:var(--blue);font-weight:600;letter-spacing:1px;}

    /* LOGOUT */
    .btn-logout{width:100%;padding:10px;background:transparent;border:1px solid var(--blue-border);border-radius:2px;
      color:var(--muted);font-family:'Rajdhani',sans-serif;font-size:12px;font-weight:600;letter-spacing:2px;text-transform:uppercase;
      cursor:pointer;transition:all 0.2s;margin-top:10px;}
    .btn-logout:hover{color:var(--text);border-color:var(--blue);}

    /* Clock small */
    .mini-clock{font-family:'Rajdhani',sans-serif;font-size:13px;letter-spacing:2px;color:var(--blue);text-align:center;margin-bottom:14px;}

    /* Toast */
    .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:rgba(6,18,38,0.97);border:1px solid var(--green);
      color:var(--green);padding:10px 22px;border-radius:4px;font-size:13px;letter-spacing:1px;font-weight:600;
      opacity:0;transition:opacity 0.3s;z-index:999;pointer-events:none;}
    .toast.show{opacity:1;}
    .toast.red{border-color:var(--red);color:var(--red);}
  </style>
</head>
<body>

<div class="page-wrap">
  <div class="top-header">
    <div class="top-logo">
      <svg viewBox="0 0 28 28" fill="none"><rect x="10" y="2" width="8" height="24" rx="2" fill="#0ea5e9"/><rect x="2" y="10" width="24" height="8" rx="2" fill="#0ea5e9"/></svg>
      <div class="top-title">CHL</div>
    </div>
    <div class="top-sub">Pointage de service</div>
  </div>

  <div class="mini-clock" id="mini-clock">--:--:--</div>

  <!-- FICHE UTILISATEUR -->
  <div class="user-card">
    <div class="user-greeting">Identifié</div>
    <div class="user-name" id="u-name">—</div>
    <div class="user-role" id="u-role">—</div>
    <div class="user-meta">
      <div class="meta-chip" id="u-perm">—</div>
      <div class="meta-chip" id="u-date">—</div>
    </div>
  </div>

  <!-- STATUS + TIMER -->
  <div class="status-card">
    <div class="status-label">État du service</div>
    <div class="status-indicator">
      <div class="status-ring offline" id="status-ring">
        <div class="status-ring-inner" id="status-icon">💤</div>
      </div>
      <div class="status-text offline" id="status-text">HORS SERVICE</div>
      <div class="timer-display offline" id="timer">00:00:00</div>
      <div class="status-since" id="status-since"></div>
    </div>
    <button class="btn-action btn-start" id="btn-action" onclick="toggleService()">▶ Prendre son service</button>
  </div>

  <!-- HISTORIQUE -->
  <div class="history-card">
    <div class="history-title">📋 Historique du jour</div>
    <div class="history-list" id="history-list">
      <div class="history-empty">Aucun pointage aujourd'hui.</div>
    </div>
  </div>

  <button class="btn-logout" onclick="handleLogout()">← Déconnexion</button>
</div>

<div class="toast" id="toast"></div>

<script type="module">
  import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';
  const supabase = createClient(
    'https://gktawbaposndfxijkxdk.supabase.co',
    'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdrdGF3YmFwb3NuZGZ4aWpreGRrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjQwNzUyNDUsImV4cCI6MjA3OTY1MTI0NX0.tY-CHuyb2zr9s6hlGkwmrdTvg920VVNghI9S45CjwKk'
  );

  const ROLE_LABELS = {
    medecin:'Médecin',chirurgien:'Chirurgien',infirmier:'Infirmier',
    apprenti_chirurgien:'Apprenti Chirurgien',apprenti_medecin:'Apprenti Médecin',stagiaire:'Stagiaire'
  };
  const PERM_LABELS = { user:'Personnel', dispatcher:'Dispatcher', admin:'Administrateur' };

  let currentUser = null;
  let timerInterval = null;
  let serviceStartTime = null;
  let inService = false;

  // Clock
  function updateClock() {
    const n=new Date();
    document.getElementById('mini-clock').textContent=
      String(n.getHours()).padStart(2,'0')+':'+String(n.getMinutes()).padStart(2,'0')+':'+String(n.getSeconds()).padStart(2,'0');
  }
  setInterval(updateClock,1000); updateClock();

  // Format duration
  function formatDuration(ms) {
    const s=Math.floor(ms/1000), m=Math.floor(s/60), h=Math.floor(m/60);
    return String(h).padStart(2,'0')+':'+String(m%60).padStart(2,'0')+':'+String(s%60).padStart(2,'0');
  }
  function formatTime(dateStr) {
    const d=new Date(dateStr);
    return String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');
  }

  // Toast
  function showToast(msg, isRed=false) {
    const t=document.getElementById('toast');
    t.textContent=msg; t.className='toast'+(isRed?' red':'');
    t.classList.add('show');
    setTimeout(()=>t.classList.remove('show'),2800);
  }

  // Timer tick
  function startTimerTick() {
    clearInterval(timerInterval);
    timerInterval = setInterval(()=>{
      if (!serviceStartTime) return;
      const elapsed = Date.now() - serviceStartTime;
      const el=document.getElementById('timer');
      el.textContent = formatDuration(elapsed);
      el.classList.remove('offline');
    },1000);
  }

  // UI update
  function setServiceUI(on) {
    const ring=document.getElementById('status-ring');
    const icon=document.getElementById('status-icon');
    const text=document.getElementById('status-text');
    const timer=document.getElementById('timer');
    const btn=document.getElementById('btn-action');
    if (on) {
      ring.className='status-ring online';
      icon.textContent='🏥';
      text.className='status-text online'; text.textContent='EN SERVICE';
      timer.classList.remove('offline');
      btn.className='btn-action btn-stop'; btn.textContent='■ Terminer son service';
      const since=new Date(serviceStartTime);
      document.getElementById('status-since').innerHTML='En service depuis <span>'+String(since.getHours()).padStart(2,'0')+':'+String(since.getMinutes()).padStart(2,'0')+'</span>';
    } else {
      ring.className='status-ring offline';
      icon.textContent='💤';
      text.className='status-text offline'; text.textContent='HORS SERVICE';
      timer.className='timer-display offline'; timer.textContent='00:00:00';
      btn.className='btn-action btn-start'; btn.textContent='▶ Prendre son service';
      document.getElementById('status-since').textContent='';
    }
  }

  // INIT
  document.addEventListener('DOMContentLoaded', async ()=>{
    currentUser = JSON.parse(localStorage.getItem('chl_point_user'));
    if (!currentUser) { window.location.href='login-point.html'; return; }

    // Refresh user from DB
    const {data:fresh} = await supabase.from('chl_users').select('*').eq('id',currentUser.id).single();
    if (fresh) { currentUser=fresh; localStorage.setItem('chl_point_user',JSON.stringify(fresh)); }

    // Fill UI
    document.getElementById('u-name').textContent = currentUser.username;
    document.getElementById('u-role').textContent = ROLE_LABELS[currentUser.role]||currentUser.role||'—';
    document.getElementById('u-perm').textContent = PERM_LABELS[currentUser.permission]||currentUser.permission||'—';
    document.getElementById('u-date').textContent = new Date().toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long'});

    // Check if already in service (presence=true)
    if (currentUser.presence) {
      // Try to retrieve service_start from chl_pointages (open session)
      const {data:openSession} = await supabase.from('chl_pointages')
        .select('*').eq('user_id',currentUser.id).is('end_time',null).order('start_time',{ascending:false}).limit(1).single();
      if (openSession) {
        serviceStartTime = new Date(openSession.start_time).getTime();
      } else {
        serviceStartTime = Date.now();
      }
      inService = true;
      setServiceUI(true);
      startTimerTick();
    }

    await loadHistory();
    // Poll for realtime updates every 30s
    setInterval(loadHistory, 30000);
  });

  // TOGGLE SERVICE
  window.toggleService = async function() {
    if (!inService) {
      // START SERVICE
      const now = new Date().toISOString();
      serviceStartTime = Date.now();
      inService = true;
      // Set presence = true
      await supabase.from('chl_users').update({presence:true}).eq('id',currentUser.id);
      // Insert open session
      await supabase.from('chl_pointages').insert({user_id:currentUser.id, username:currentUser.username, start_time:now, end_time:null});
      setServiceUI(true);
      startTimerTick();
      showToast('✓ Service démarré — Bonne prise de poste !');
    } else {
      // STOP SERVICE
      const now = new Date().toISOString();
      inService = false;
      clearInterval(timerInterval);
      // Set presence = false, reset patrol
      await supabase.from('chl_users').update({presence:false, patrol:null}).eq('id',currentUser.id);
      // Close open session
      const {data:openSession} = await supabase.from('chl_pointages')
        .select('*').eq('user_id',currentUser.id).is('end_time',null).order('start_time',{ascending:false}).limit(1).single();
      if (openSession) {
        await supabase.from('chl_pointages').update({end_time:now}).eq('id',openSession.id);
      }
      serviceStartTime = null;
      setServiceUI(false);
      showToast('✓ Service terminé — À bientôt !', false);
      await loadHistory();
    }
  };

  // LOAD HISTORY
  async function loadHistory() {
    const today = new Date(); today.setHours(0,0,0,0);
    const {data:sessions} = await supabase.from('chl_pointages')
      .select('*').eq('user_id',currentUser.id)
      .gte('start_time',today.toISOString())
      .order('start_time',{ascending:false});

    const list = document.getElementById('history-list');
    if (!sessions || sessions.length===0) {
      list.innerHTML='<div class="history-empty">Aucun pointage aujourd\'hui.</div>';
      return;
    }
    list.innerHTML = sessions.map(s=>{
      const startStr = formatTime(s.start_time);
      const endStr = s.end_time ? formatTime(s.end_time) : '<span style="color:var(--green)">En cours</span>';
      const dur = s.end_time ? formatDuration(new Date(s.end_time)-new Date(s.start_time)) : '';
      return `<div class="history-item">
        <div><div class="history-times">${startStr} → ${endStr}</div><div class="history-date">${new Date(s.start_time).toLocaleDateString('fr-FR')}</div></div>
        <div class="history-dur">${dur}</div>
      </div>`;
    }).join('');
  }

  // LOGOUT
  window.handleLogout = function() {
    // NOTE: presence stays TRUE if still in service — intentional
    // so dispatch still shows them. They must end service first.
    if (inService) {
      if (!confirm('Vous êtes encore en service. Votre présence restera active sur le dispatch.\nQuitter quand même ?')) return;
    }
    localStorage.removeItem('chl_point_user');
    window.location.href = 'login-point.html';
  };

  // Page close / refresh: do NOT auto-end service (intentional, stays visible in dispatch)
  // Only manual "Terminer son service" ends presence
</script>
</body>
</html>
